name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  phpcs:
    name: PHPCS (WooCommerce-Core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPCS
        run: composer phpcs

  phpunit:
    name: PHPUnit (wp-env, WooCommerce)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Install npm dependencies
        run: npm install --no-fund --no-audit
      - name: Start wp-env
        run: npx wp-env start
      - name: Run PHPUnit
        run: npm run test:php

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build clean plugin dir
        run: |
          mkdir -p /tmp/pcc/markdown-mirror-for-woocommerce
          rsync -a --exclude-from=.distignore ./ /tmp/pcc/markdown-mirror-for-woocommerce/
      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: /tmp/pcc/markdown-mirror-for-woocommerce

  build:
    name: Build zip artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: bash scripts/build-zip.sh
      - uses: actions/upload-artifact@v4
        with:
          name: markdown-mirror-for-woocommerce
          path: dist/markdown-mirror-for-woocommerce.zip
